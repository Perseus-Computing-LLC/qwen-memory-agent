<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mimir MemoryAgent Architecture</title>
<style>
  body {
    background: #0d1117;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
  }
</style>
</head>
<body>
<svg width="900" height="620" viewBox="0 0 900 620"
     xmlns="http://www.w3.org/2000/svg" style="background: #0d1117;">

  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="qwenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#1f6feb"/>
    </linearGradient>
    <linearGradient id="mimirGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d2991d"/>
      <stop offset="100%" stop-color="#9f6600"/>
    </linearGradient>
    <linearGradient id="agentGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bc8cff"/>
      <stop offset="100%" stop-color="#7b3fd4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" fill="#c9d1d9"
        font-family="JetBrains Mono,monospace" font-size="16" font-weight="700">
    Mimir MemoryAgent — Architecture
  </text>
  <text x="450" y="56" text-anchor="middle" fill="#8b949e"
        font-family="JetBrains Mono,monospace" font-size="11">
    Qwen Cloud Global AI Hackathon 2026 · Track 1: MemoryAgent
  </text>

  <!-- ===== TOP: User ===== -->
  <rect x="350" y="75" width="200" height="44" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="450" y="102" text-anchor="middle" fill="#58a6ff"
        font-family="JetBrains Mono,monospace" font-size="13" font-weight="700">User (CLI)</text>

  <!-- Arrow: User → Agent -->
  <line x1="450" y1="119" x2="450" y2="158" stroke="#30363d" stroke-width="1.5"/>
  <polygon points="445,155 450,165 455,155" fill="#30363d"/>

  <!-- ===== MIDDLE: MemoryAgent ===== -->
  <rect x="275" y="168" width="350" height="88" rx="10" fill="#161b22" stroke="#bc8cff" stroke-width="2" filter="url(#glow)"/>
  <rect x="275" y="168" width="350" height="28" rx="10" fill="url(#agentGrad)"/>
  <text x="450" y="188" text-anchor="middle" fill="#fff"
        font-family="JetBrains Mono,monospace" font-size="13" font-weight="700">MemoryAgent (Python)</text>

  <!-- Loop arrows inside agent -->
  <text x="305" y="215" fill="#bc8cff" font-family="JetBrains Mono,monospace" font-size="10">recall</text>
  <text x="375" y="215" fill="#bc8cff" font-family="JetBrains Mono,monospace" font-size="10">→ reason</text>
  <text x="460" y="215" fill="#bc8cff" font-family="JetBrains Mono,monospace" font-size="10">→ remember</text>
  <text x="305" y="235" fill="#8b949e" font-family="JetBrains Mono,monospace" font-size="10">mimir_bridge.py  ·  qwen_client.py  ·  agent.py</text>

  <!-- Arrow: Agent → Qwen -->
  <line x1="625" y1="212" x2="745" y2="212" stroke="#30363d" stroke-width="1.5"/>
  <polygon points="742,208 755,212 742,216" fill="#30363d"/>
  <text x="685" y="206" text-anchor="middle" fill="#8b949e" font-size="9">reasoning</text>
  <text x="685" y="230" text-anchor="middle" fill="#8b949e" font-size="9">requests</text>

  <!-- ===== RIGHT: Qwen Cloud ===== -->
  <rect x="758" y="168" width="130" height="88" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
  <rect x="758" y="168" width="130" height="28" rx="10" fill="url(#qwenGrad)"/>
  <text x="823" y="188" text-anchor="middle" fill="#fff"
        font-family="JetBrains Mono,monospace" font-size="12" font-weight="700">Qwen Cloud</text>
  <text x="823" y="215" text-anchor="middle" fill="#58a6ff" font-size="10">qwen-max</text>
  <text x="823" y="235" text-anchor="middle" fill="#8b949e" font-size="9">OpenAI API</text>

  <!-- Arrow: Qwen → Agent (response) -->
  <line x1="758" y1="228" x2="625" y2="228" stroke="#30363d" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="685" y="244" text-anchor="middle" fill="#8b949e" font-size="8">response</text>

  <!-- Arrow: Agent → Mimir -->
  <line x1="450" y1="256" x2="450" y2="308" stroke="#30363d" stroke-width="1.5"/>
  <polygon points="445,305 450,315 455,305" fill="#30363d"/>
  <text x="465" y="283" fill="#8b949e" font-size="9">MCP tools</text>

  <!-- ===== BOTTOM: Mimir ===== -->
  <rect x="275" y="318" width="350" height="120" rx="10" fill="#161b22" stroke="#d2991d" stroke-width="2"/>
  <rect x="275" y="318" width="350" height="28" rx="10" fill="url(#mimirGrad)"/>
  <text x="450" y="338" text-anchor="middle" fill="#fff"
        font-family="JetBrains Mono,monospace" font-size="13" font-weight="700">Mimir (Rust) — Persistent Memory</text>

  <!-- Features grid -->
  <text x="300" y="365" fill="#d2991d" font-family="JetBrains Mono,monospace" font-size="9">▶ FTS5 keyword search</text>
  <text x="300" y="382" fill="#d2991d" font-family="JetBrains Mono,monospace" font-size="9">▶ Vector (Ollama) hybrid</text>
  <text x="300" y="399" fill="#d2991d" font-family="JetBrains Mono,monospace" font-size="9">▶ Ebbinghaus decay</text>
  <text x="300" y="416" fill="#d2991d" font-family="JetBrains Mono,monospace" font-size="9">▶ AES-256-GCM encryption</text>
  <text x="540" y="365" fill="#d2991d" font-family="JetBrains Mono,monospace" font-size="9">▶ 27 MCP tools</text>
  <text x="540" y="382" fill="#d2991d" font-family="JetBrains Mono,monospace" font-size="9">▶ Cross-session SQLite</text>
  <text x="540" y="399" fill="#d2991d" font-family="JetBrains Mono,monospace" font-size="9">▶ recall_when triggers</text>
  <text x="540" y="416" fill="#d2991d" font-family="JetBrains Mono,monospace" font-size="9">▶ Entity linking graph</text>

  <!-- ===== Memory Model box ===== -->
  <rect x="90" y="480" width="720" height="110" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="450" y="502" text-anchor="middle" fill="#8b949e"
        font-family="JetBrains Mono,monospace" font-size="10" font-weight="600">Memory Entity Model</text>

  <rect x="110" y="512" width="160" height="50" rx="4" fill="#0d1117" stroke="#30363d"/>
  <text x="190" y="532" text-anchor="middle" fill="#bc8cff" font-family="monospace" font-size="9">category + key</text>
  <text x="190" y="548" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="8">user_preference/prefers-deepseek</text>

  <rect x="290" y="512" width="160" height="50" rx="4" fill="#0d1117" stroke="#30363d"/>
  <text x="370" y="532" text-anchor="middle" fill="#d2991d" font-family="monospace" font-size="9">importance 0.0–1.0</text>
  <text x="370" y="548" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="8">1.0 = never decay</text>

  <rect x="470" y="512" width="160" height="50" rx="4" fill="#0d1117" stroke="#30363d"/>
  <text x="550" y="532" text-anchor="middle" fill="#3fb950" font-family="monospace" font-size="9">decay_score 0.0–1.0</text>
  <text x="550" y="548" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="8">< 0.05 → archived</text>

  <rect x="650" y="512" width="140" height="50" rx="4" fill="#0d1117" stroke="#30363d"/>
  <text x="720" y="532" text-anchor="middle" fill="#58a6ff" font-family="monospace" font-size="9">body_json</text>
  <text x="720" y="548" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="8">{content, summary}</text>

  <!-- Bottom loop label -->
  <text x="450" y="610" text-anchor="middle" fill="#8b949e"
        font-family="JetBrains Mono,monospace" font-size="9">
    RECALL → REASON → REMEMBER → GROOM (Ebbinghaus decay every 10 turns)
  </text>

</svg>
</body>
</html>
